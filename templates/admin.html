{% extends "base.html" %}

{% block content %}
<div style="margin-bottom: 2rem;">
    <h2 style="font-size: 2.5rem; margin-bottom: 0.5rem;">Admin Dashboard</h2>
    <p style="color: var(--text-muted);">Manage library catalog.</p>
</div>

<div class="card">
    <h3 style="margin-bottom: 1.5rem; border-bottom: 1px solid rgba(255,255,255,0.1); padding-bottom: 0.5rem;">Add New Book</h3>
    
    <form action="/admin/add_book" method="POST" style="display: grid; grid-template-columns: 1fr 1fr; gap: 1rem;">
        <div class="form-group">
            <label for="title">Title</label>
            <input type="text" id="title" name="title" required>
        </div>
        
        <div class="form-group">
            <label for="author">Author</label>
            <input type="text" id="author" name="author" required>
        </div>
        
        <div class="form-group">
            <label for="genre">Genre</label>
            <input type="text" id="genre" name="genre" required>
        </div>
        
        <div class="form-group">
            <label for="total_copies">Total Copies</label>
            <input type="number" id="total_copies" name="total_copies" min="1" value="1" required>
        </div>
        
        <div class="form-group" style="grid-column: span 2;">
            <label for="cover_image_url">Cover Image URL</label>
            <input type="url" id="cover_image_url" name="cover_image_url">
        </div>
        
        <div class="form-group" style="grid-column: span 2;">
            <label for="description">Description</label>
            <textarea id="description" name="description" rows="4" style="width: 100%; padding: 0.75rem 1rem; border-radius: 8px; border: 1px solid var(--surface-light); background: rgba(15, 23, 42, 0.5); color: var(--text); font-size: 1rem; font-family: inherit; resize: vertical;"></textarea>
        </div>
        
        <div style="grid-column: span 2;">
            <button type="submit" class="btn btn-primary">Add Book to Catalog</button>
        </div>
    </form>
</div>
{% endblock %}
